name: Python CI

on:
  push:
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/python.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest

      - name: Install shared package (editable)
        run: |
          pip install -e SecurityAnalyst/_SHARED/Python

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest
