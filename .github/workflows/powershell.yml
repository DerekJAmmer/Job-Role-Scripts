name: PowerShell CI

on:
  push:
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '**/*.psd1'
      - 'PSScriptAnalyzerSettings.psd1'
      - '.github/workflows/powershell.yml'
  pull_request:
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '**/*.psd1'
      - 'PSScriptAnalyzerSettings.psd1'
      - '.github/workflows/powershell.yml'

jobs:
  analyze-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester and PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings .\PSScriptAnalyzerSettings.psd1
          if ($results) {
              $results | Format-Table -AutoSize | Out-String | Write-Host
              if ($results | Where-Object Severity -in 'Error','Warning') {
                  throw "PSScriptAnalyzer found issues."
              }
          }

      - name: Pester
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = '.'
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'pester-results.xml'
          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) { throw "Pester failures: $($result.FailedCount)" }
